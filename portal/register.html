<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Volunteer Registration</title><link rel="stylesheet" href="../assets/css/styles.css"></head>
<body data-auth-page="register" data-role="volunteer">
  <main class="auth-shell"><section class="auth-art"><div><span class="eyebrow">Join the work</span><h1>Create your volunteer account</h1><p>Register to apply for outreach roles and submit community help requests.</p></div></section><section class="auth-card"><div class="panel"><h2>Volunteer Registration</h2><form class="form-grid" data-register-form><div class="field-row"><label>Full name<input name="name" required></label><label>Phone<input name="phone" required></label></div><label>Email<input type="email" name="email" required></label><label>Password<input type="password" name="password" required></label><label>Skill or profession<input name="skill" placeholder="Doctor, nurse, nutritionist, community worker" required></label><button class="btn btn-primary" type="submit">Create Account</button><a href="login.html">Already have an account?</a><span class="form-note"></span></form></div></section></main>
  <script src="../assets/js/store.js"></script><script src="../assets/js/auth.js"></script>
</body>
</html>
