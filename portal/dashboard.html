<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Volunteer Dashboard</title><link rel="stylesheet" href="../assets/css/styles.css"></head>
<body>
  <main class="dashboard"><aside class="sidebar"><a class="brand" href="../index.html"><span class="brand-mark">MH</span><span><strong>Volunteer Portal</strong><small data-volunteer-name>Volunteer</small></span></a><nav><a class="btn" href="../index.html">View Site</a><a class="btn" href="../pages/activities.html">Activities</a><button class="btn" type="button" data-logout>Logout</button></nav></aside><section class="dashboard-main"><div class="section-head"><span class="eyebrow">Portal</span><h2>Volunteer and help dashboard</h2><p>Apply for outreach opportunities or request food and health support.</p></div><div class="card-grid two"><div class="panel"><h3>Volunteer Application</h3><form class="form-grid" data-application-form><div class="field-row"><label>Name<input name="name" required></label><label>Email<input type="email" name="email" required></label></div><label>Role<select name="role" required><option>Doctor</option><option>Nurse</option><option>Nutritionist</option><option>Community worker</option><option>Logistics volunteer</option><option>Donor / partner</option></select></label><label>Availability<input name="availability" placeholder="Weekends, monthly, event days" required></label><label>How can you help?<textarea name="message" required></textarea></label><button class="btn btn-primary" type="submit">Submit Application</button><span class="form-note"></span></form></div><div class="panel"><h3>Request Help</h3><form class="form-grid" data-help-form><div class="field-row"><label>Name<input name="name" required></label><label>Phone<input name="phone" required></label></div><label>Community<input name="community" required></label><label>Request type<select name="requestType" required><option>Emergency food assistance</option><option>Health screening camp</option><option>Nutrition education</option><option>Referral guidance</option></select></label><label>Message<textarea name="message" required></textarea></label><button class="btn btn-primary" type="submit">Submit Help Request</button><span class="form-note"></span></form></div></div><section class="section"><div class="card-grid two"><div class="panel"><h3>My Applications</h3><div class="table-wrap"><table><thead><tr><th>Role</th><th>Availability</th><th>Status</th></tr></thead><tbody data-my-applications></tbody></table></div></div><div class="panel"><h3>My Help Requests</h3><div class="table-wrap"><table><thead><tr><th>Request</th><th>Community</th><th>Status</th></tr></thead><tbody data-my-help></tbody></table></div></div></div></section></section></main>
  <script src="../assets/js/store.js"></script><script src="../assets/js/app.js"></script><script src="../assets/js/portal.js"></script>
</body>
</html>
